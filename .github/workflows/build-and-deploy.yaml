name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint & Typecheck
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    uses: ./.github/workflows/js-run-linters.yaml

  # ──────────────────────────────────────────────
  # 2. E2E Tests
  # ──────────────────────────────────────────────
  test:
    name: Test
    uses: ./.github/workflows/js-run-tests.yaml

  # ──────────────────────────────────────────────
  # 3. Build Docker image & push to AWS ECR
  # ──────────────────────────────────────────────
  build_and_push:
    name: Build & push Docker image
    needs: [lint, test]
    uses: ./.github/workflows/build-and-push-docker-image.yaml
    with:
      aws_region: ${{ vars.AWS_REGION }}
      aws_ecr_repository: ${{ vars.AWS_ECR_REPOSITORY }}
    secrets:
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ──────────────────────────────────────────────
  # 4. Deploy to Minikube (smoke test)
  # ──────────────────────────────────────────────
  deploy_minikube:
    name: Deploy to Minikube
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR pull secret
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          kubectl create secret docker-registry ecr-secret \
            --docker-server=$ECR_REGISTRY \
            --docker-username=AWS \
            --docker-password=$(aws ecr get-login-password) \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update deployment image
        env:
          IMAGE: ${{ needs.build_and_push.outputs.image_tag }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml

      - name: Deploy to Minikube
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for deployment rollout
        run: kubectl rollout status deployment/react-app --timeout=120s

      - name: Verify app is accessible
        run: |
          kubectl port-forward svc/react-app-service 8080:80 &
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          if [ "$STATUS" != "200" ]; then
            echo "Health check FAILED — HTTP $STATUS"
            kubectl get pods
            kubectl describe deployment react-app
            exit 1
          fi
          echo "Health check PASSED — HTTP $STATUS"

  # ──────────────────────────────────────────────
  # 5. Deploy to AWS EKS
  # ──────────────────────────────────────────────
  deploy_eks:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ vars.EKS_CLUSTER_NAME }} \
            --region ${{ vars.AWS_REGION }}

      - name: Create/update ECR pull secret
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          kubectl create secret docker-registry ecr-secret \
            --docker-server=$ECR_REGISTRY \
            --docker-username=AWS \
            --docker-password=$(aws ecr get-login-password) \
            --namespace=default \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update deployment image
        env:
          IMAGE: ${{ needs.build_and_push.outputs.image_tag }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/react-app --timeout=120s

      - name: Get app URL
        run: |
          echo "Waiting for LoadBalancer DNS..."
          for i in $(seq 1 30); do
            LB_HOST=$(kubectl get svc react-app-service \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$LB_HOST" ]; then
              echo "✅ App is live at: http://$LB_HOST"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          if [ -z "$LB_HOST" ]; then
            echo "LoadBalancer DNS not assigned after 5 minutes"
            exit 1
          fi
