name: (reusable) run linters and typecheck

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "22"

jobs:
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run tsc:src

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: js-lint
        run: npx eslint src/ -f json -o lint.json

      - name: Annotate PR on failure
        if: failure() && steps.js-lint.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            try {
              const report = JSON.parse(fs.readFileSync('./lint.json', 'utf-8'));
              report.flatMap(entry => entry.messages.map(message => {
                core.error(message.message, {
                  title: message.ruleId,
                  file: entry.filePath.replace(`${process.env.GITHUB_WORKSPACE}/`, ''),
                  startLine: message.line,
                  endLine: message.endLine || message.line,
                  startColumn: message.column,
                  endColumn: message.endColumn || message.column
                });
              }));
            } catch (error) {
              core.error(`PR annotation failed: ${error}`);
            }

      - name: Archive linter results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: ./lint.json
          retention-days: 7
