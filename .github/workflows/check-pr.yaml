name: Check PR

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint & Typecheck
    uses: ./.github/workflows/js-run-linters.yaml

  test:
    name: Test
    uses: ./.github/workflows/js-run-tests.yaml

  build:
    name: Build Docker image (dry-run)
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
